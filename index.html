<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrtechnician | Quest Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>MRTECHNICIAN</h1>
                <p id="current-date"></p>
            </div>
            <div class="stats-header">
                <div class="stat-circle">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="progress-circle" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="percent-text">0%</text>
                    </svg>
                </div>
            </div>
        </header>

        <section class="task-section">
            <div class="section-header">
                <h2>Today's Quests</h2>
                <button onclick="togglePlanningMode()" class="btn-plan">Nightly Planning</button>
            </div>
            <div id="habit-list" class="habit-list">
                </div>
        </section>
    </div>

    <div id="planning-modal" class="modal">
        <div class="modal-content">
            <h3>Set Habits for Tomorrow</h3>
            <div id="planning-options"></div>
            <button onclick="saveNightlyPlan()" class="btn-save">Lock for Tomorrow</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
