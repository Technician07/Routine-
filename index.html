<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrtechnician | Quest Control</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #22c55e; /* Success Green */
            --neon-blue: #00f2ff;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 600px; }

        /* HUD Section */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.7);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
        }

        .stats-display { text-align: center; position: relative; width: 80px; height: 80px; }
        
        svg.progress-ring { transform: rotate(-90deg); }
        .progress-ring__circle {
            stroke: var(--accent);
            stroke-dasharray: 226; /* 2 * PI * r */
            stroke-dashoffset: 226;
            transition: stroke-dashoffset 0.5s ease;
            filter: drop-shadow(0 0 5px var(--accent));
        }

        .pct-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 14px;
        }

        /* Task Sections */
        .section-title { font-size: 1.2rem; margin: 20px 0 10px; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px; }

        .quest-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .quest-card.done { border-color: var(--accent); background: rgba(34, 197, 94, 0.05); opacity: 0.8; }

        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* Planning Area */
        .planning-box {
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #334155;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            padding: 10px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .grid-container { overflow-x: auto; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #334155; padding: 8px; text-align: center; }
        .green-cell { background: var(--accent); color: black; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size: 1.4rem;">DISCIPLINE PROTOCOL</h1>
            <p id="date-label" style="margin:5px 0 0; color: #94a3b8; font-size: 0.9rem;"></p>
        </div>
        <div class="stats-display">
            <svg class="progress-ring" width="80" height="80">
                <circle stroke="rgba(255,255,255,0.1)" stroke-width="6" fill="transparent" r="36" cx="40" cy="40"/>
                <circle id="ring-fill" class="progress-ring__circle" stroke-width="6" fill="transparent" r="36" cx="40" cy="40"/>
            </svg>
            <div class="pct-text" id="pct-val">0%</div>
        </div>
    </header>

    <div class="section">
        <h3 class="section-title">Active Quests</h3>
        <div id="today-list"></div>
    </div>

    <div class="section planning-box">
        <h3 class="section-title" style="margin-top: 0; color: #94a3b8;">Nightly Planning</h3>
        <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 10px;">Set your habits for tomorrow before you sleep.</p>
        <textarea id="tomorrow-input" placeholder="Enter habits (one per line)..."></textarea>
        <button class="btn-action" onclick="saveTomorrow()">Lock for Tomorrow</button>
    </div>

    <div class="grid-container">
        <h3 class="section-title">Consistency Log</h3>
        <table id="history-table"></table>
    </div>
</div>

<script>
    // CORE DATA ENGINE
    let historyData = JSON.parse(localStorage.getItem('mr_tech_history')) || {};
    let tomorrowPlan = JSON.parse(localStorage.getItem('mr_tech_plan')) || [];
    
    const todayKey = new Date().toISOString().split('T')[0];

    function init() {
        // Handle Midnight Transition
        let lastVisit = localStorage.getItem('last_visit_date');
        if (lastVisit && lastVisit !== todayKey) {
            // New day detected! Move tomorrow's plan into history for today
            if (tomorrowPlan.length > 0) {
                historyData[todayKey] = tomorrowPlan.map(name => ({ name, done: false }));
                tomorrowPlan = [];
                localStorage.setItem('mr_tech_plan', JSON.stringify([]));
                localStorage.setItem('mr_tech_history', JSON.stringify(historyData));
            }
        }
        localStorage.setItem('last_visit_date', todayKey);
        
        document.getElementById('date-label').innerText = new Date().toDateString();
        render();
    }

    function toggleHabit(index) {
        historyData[todayKey][index].done = !historyData[todayKey][index].done;
        localStorage.setItem('mr_tech_history', JSON.stringify(historyData));
        render();
    }

    function saveTomorrow() {
        const input = document.getElementById('tomorrow-input').value.trim();
        if (!input) return alert("Enter at least one habit!");
        
        tomorrowPlan = input.split('\n').filter(h => h.trim() !== "");
        localStorage.setItem('mr_tech_plan', JSON.stringify(tomorrowPlan));
        alert("Quests Locked for Tomorrow!");
        document.getElementById('tomorrow-input').value = "";
    }

    function render() {
        // 1. Render Active Quests
        const listContainer = document.getElementById('today-list');
        listContainer.innerHTML = "";
        const dailyQuests = historyData[todayKey] || [];
        
        dailyQuests.forEach((q, i) => {
            listContainer.innerHTML += `
                <div class="quest-card ${q.done ? 'done' : ''}">
                    <span>${q.name}</span>
                    <input type="checkbox" ${q.done ? 'checked' : ''} onclick="toggleHabit(${i})">
                </div>
            `;
        });

        // 2. Update Progress Ring
        const total = dailyQuests.length;
        const done = dailyQuests.filter(q => q.done).length;
        const pct = total === 0 ? 0 : Math.round((done / total) * 100);
        
        document.getElementById('pct-val').innerText = pct + "%";
        const offset = 226 - (pct / 100 * 226);
        document.getElementById('ring-fill').style.strokeDashoffset = offset;

        // 3. Render Consistency Table (Grid)
        renderGrid();
    }

    function renderGrid() {
        const table = document.getElementById('history-table');
        const dates = Object.keys(historyData).sort().reverse().slice(0, 7); // Last 7 days
        
        if (dates.length === 0) {
            table.innerHTML = "<tr><td>No data yet. Start your first quest!</td></tr>";
            return;
        }

        let html = "<tr><th>Date</th><th>Score</th></tr>";
        dates.forEach(date => {
            const dayItems = historyData[date];
            const score = dayItems.filter(item => item.done).length;
            const total = dayItems.length;
            const isPerfect = score === total && total > 0;
            
            html += `<tr>
                <td>${date === todayKey ? 'Today' : date}</td>
                <td class="${isPerfect ? 'green-cell' : ''}">${score}/${total}</td>
            </tr>`;
        });
        table.innerHTML = html;
    }

    init();
</script>

</body>
</html>
