<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrNir | Discipline Protocol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="hud-header">
            <div class="user-profile">
                <h1>MISSION CONTROL</h1>
                <p>Nir's Discipline Protocol • March 2026</p>
            </div>
            <div class="level-badge">
                <span class="label">Current Level</span>
                <div class="rank" id="current-level">LVL 01</div>
            </div>
        </header>

        <div class="stats-card">
            <div class="progress-info">
                <span>Daily Success Rate</span>
                <span id="completion-text">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="main-progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div class="habit-grid" id="habit-grid">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
