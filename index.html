<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Habit Tracker Pro Elite</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  background:#1e293b;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:15px;
}

.section{
  margin-top:20px;
}

.box{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

textarea{
  width:100%;
  height:100px;
  border-radius:10px;
  padding:10px;
}

button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.grid{
  overflow-x:auto;
  margin-top:20px;
}

table{
  border-collapse:collapse;
  width:100%;
}

th, td{
  border:1px solid #334155;
  padding:6px;
  text-align:center;
}

th{
  background:#1e293b;
}

.week{
  background:#334155;
  font-weight:bold;
}

.habit-name{
  text-align:left;
}

</style>

</head>
<body>

<header>🔥 Habit Tracker Elite</header>

<div class="container">

  <!-- TODAY -->
  <div class="section">
    <h3>📅 Today</h3>
    <div id="todayBox" class="box"></div>
  </div>

  <!-- TOMORROW -->
  <div class="section">
    <h3>⏭ Tomorrow</h3>
    <textarea id="tomorrowInput" placeholder="Write habits (one per line)"></textarea>
    <button onclick="saveTomorrow()">Save Tomorrow</button>
    <div id="tomorrowBox" class="box"></div>
  </div>

  <!-- GRID -->
  <div class="grid">
    <table id="table"></table>
  </div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("habitData")) || {};
let tomorrowData = JSON.parse(localStorage.getItem("tomorrowData")) || [];

let now = new Date();
let year = now.getFullYear();
let month = now.getMonth();
let today = now.getDate();

let days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
let daysInMonth = new Date(year, month+1, 0).getDate();

function getKey(date){
  return `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
}

function save(){
  localStorage.setItem("habitData", JSON.stringify(data));
  localStorage.setItem("tomorrowData", JSON.stringify(tomorrowData));
}

// ===== SAVE TOMORROW =====
function saveTomorrow(){
  let input = document.getElementById("tomorrowInput").value.trim();
  if(!input) return;

  tomorrowData = input.split("\n").slice(0,6).map(h=>({name:h, done:false}));

  save();
  render();
}

// ===== AUTO MOVE AFTER 12AM =====
function autoMove(){
  let lastDate = localStorage.getItem("lastDate");
  let todayKey = getKey(new Date());

  if(lastDate !== todayKey){
    localStorage.setItem("lastDate", todayKey);

    if(tomorrowData.length){
      data[todayKey] = tomorrowData;
      tomorrowData = [];
      save();
    }
  }
}

// ===== TOGGLE =====
function toggle(key, index){
  data[key][index].done = !data[key][index].done;
  save();
  render();
}

// ===== TODAY BOX =====
function renderToday(){
  let box = document.getElementById("todayBox");
  box.innerHTML = "";

  let key = getKey(new Date());
  let todayList = data[key] || [];

  todayList.forEach((h,i)=>{
    box.innerHTML += `
      <div>
        <input type="checkbox" ${h.done?"checked":""}
        onclick="toggle('${key}',${i})">
        ${h.name}
      </div>
    `;
  });
}

// ===== TOMORROW BOX =====
function renderTomorrow(){
  let box = document.getElementById("tomorrowBox");
  box.innerHTML = "";

  tomorrowData.forEach(h=>{
    box.innerHTML += `<div>${h.name}</div>`;
  });
}

// ===== GRID WITH WEEKS =====
function renderGrid(){
  let table = document.getElementById("table");
  table.innerHTML = "";

  let allHabits = [];

  Object.values(data).forEach(day=>{
    day.forEach(h=>{
      if(!allHabits.includes(h.name)) allHabits.push(h.name);
    });
  });

  // Header with weeks
  let header = "<tr><th>Habits</th>";

  for(let d=1; d<=daysInMonth; d++){
    if(d % 7 === 1){
      header += `<th class="week" colspan="7">Week ${Math.ceil(d/7)}</th>`;
    }
  }
  header += "</tr><tr><th></th>";

  for(let d=1; d<=daysInMonth; d++){
    let date = new Date(year, month, d);
    header += `<th>${days[date.getDay()]}<br>${d}</th>`;
  }
  header += "</tr>";

  table.innerHTML += header;

  // Rows
  allHabits.forEach(habit=>{
    let row = `<tr><td class="habit-name">${habit}</td>`;

    for(let d=1; d<=daysInMonth; d++){
      let key = `${year}-${month}-${d}`;
      let dayData = data[key] || [];

      let found = dayData.find(h=>h.name===habit);
      let checked = found && found.done ? "checked" : "";
      let index = dayData.findIndex(h=>h.name===habit);

      row += `
        <td>
          ${found ? `<input type="checkbox" ${checked}
          onclick="toggle('${key}',${index})">` : ""}
        </td>
      `;
    }

    row += "</tr>";
    table.innerHTML += row;
  });
}

// ===== RENDER =====
function render(){
  renderToday();
  renderTomorrow();
  renderGrid();
}

// ===== INIT =====
autoMove();
render();

</script>

</body>
</html>
