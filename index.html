<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Habit Tracker Pro Max</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  background:#1e293b;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:15px;
}

textarea{
  width:100%;
  height:100px;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}

button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.section{
  margin-top:20px;
}

.grid{
  overflow-x:auto;
  margin-top:20px;
}

table{
  border-collapse:collapse;
  width:100%;
}

th, td{
  border:1px solid #334155;
  padding:6px;
  text-align:center;
}

th{
  background:#1e293b;
}

.habit-name{
  text-align:left;
}

.checkbox{
  width:18px;
  height:18px;
}

.today-box{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.day-title{
  font-size:18px;
  margin-bottom:10px;
}

</style>

</head>
<body>

<header>🔥 Habit Tracker Pro Max</header>

<div class="container">

  <!-- INPUT -->
  <div class="section">
    <h3>Add Tomorrow Habits (one per line)</h3>
    <textarea id="habitInput" placeholder="Gym&#10;Study&#10;Cricket&#10;Meditation"></textarea>
    <button onclick="saveTomorrow()">Save Tomorrow List</button>
  </div>

  <!-- TODAY -->
  <div class="section">
    <h3>Today's To-Do</h3>
    <div id="todayList" class="today-box"></div>
  </div>

  <!-- GRID -->
  <div class="grid">
    <table id="table"></table>
  </div>

</div>

<script>

// ===== STORAGE =====
let data = JSON.parse(localStorage.getItem("habitData")) || {};

// ===== DATE =====
let now = new Date();
let year = now.getFullYear();
let month = now.getMonth();
let todayDate = now.getDate();

// ===== DAYS =====
const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
let daysInMonth = new Date(year, month+1, 0).getDate();

// ===== SAVE =====
function save(){
  localStorage.setItem("habitData", JSON.stringify(data));
}

// ===== SAVE TOMORROW =====
function saveTomorrow(){
  let input = document.getElementById("habitInput").value.trim();
  if(!input) return;

  let list = input.split("\n").slice(0,6); // max 6 habits

  let tomorrow = new Date();
  tomorrow.setDate(todayDate + 1);

  let key = getKey(tomorrow);

  data[key] = list.map(h => ({name:h, done:false}));

  save();
  render();
}

// ===== KEY =====
function getKey(date){
  return `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
}

// ===== AUTO SHIFT AFTER 12AM =====
function checkNewDay(){
  let last = localStorage.getItem("lastDate");

  let todayKey = getKey(new Date());

  if(last !== todayKey){
    localStorage.setItem("lastDate", todayKey);
    render();
  }
}

// ===== TOGGLE =====
function toggle(dayKey, index){
  data[dayKey][index].done = !data[dayKey][index].done;
  save();
  render();
}

// ===== TODAY LIST =====
function renderToday(){
  let box = document.getElementById("todayList");
  box.innerHTML = "";

  let key = getKey(new Date());
  let todayData = data[key] || [];

  let dayName = days[new Date().getDay()];

  box.innerHTML += `<div class="day-title">${dayName} (${todayDate})</div>`;

  todayData.forEach((h, i)=>{
    box.innerHTML += `
      <div>
        <input type="checkbox" ${h.done?"checked":""}
        onclick="toggle('${key}', ${i})">
        ${h.name}
      </div>
    `;
  });
}

// ===== GRID =====
function renderGrid(){
  let table = document.getElementById("table");
  table.innerHTML = "";

  // Header
  let header = "<tr><th>Habits</th>";
  for(let d=1; d<=daysInMonth; d++){
    let date = new Date(year, month, d);
    header += `<th>${days[date.getDay()]}<br>${d}</th>`;
  }
  header += "</tr>";
  table.innerHTML += header;

  // Collect all habits (max structure)
  let allHabits = [];

  Object.values(data).forEach(day=>{
    day.forEach(h=>{
      if(!allHabits.includes(h.name)) allHabits.push(h.name);
    });
  });

  // Rows
  allHabits.forEach(habit=>{
    let row = `<tr><td class="habit-name">${habit}</td>`;

    for(let d=1; d<=daysInMonth; d++){
      let key = `${year}-${month}-${d}`;
      let dayData = data[key] || [];

      let found = dayData.find(h=>h.name===habit);
      let checked = found && found.done ? "checked" : "";

      let index = dayData.findIndex(h=>h.name===habit);

      row += `
        <td>
          ${found ? `<input type="checkbox" ${checked}
          onclick="toggle('${key}', ${index})">` : ""}
        </td>
      `;
    }

    row += "</tr>";
    table.innerHTML += row;
  });
}

// ===== RENDER =====
function render(){
  renderToday();
  renderGrid();
}

// ===== INIT =====
checkNewDay();
render();

</script>

</body>
</html>
